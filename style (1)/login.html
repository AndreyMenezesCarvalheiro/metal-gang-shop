<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Metal Gang Shop</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <header>
        <div class="logo">METAL GANG SHOP</div>

        <nav>
            <a href="index.html">Página Inicial</a>
            <a href="index.html#camisetas">Camisetas</a>
            <a href="index.html#acessorios">Acessórios</a>
            <a href="index.html#cds">CD's</a>
            <a href="index.html#vinis">Vinis</a>
        </nav>

        <div class="menu-direita">
            <a href="#">Buscar</a>
            <a href="login.html">Login/Cadastre-se</a>
            <a href="#">Carrinho</a>
        </div>
    </header>

    <main class="login-container">
        <form class="login-box">
            <h1>Login</h1>

            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="••••••••" required>

            <div class="opcoes">
                <label class="lembrar"><input type="checkbox"> Lembrar de mim</label>
                <a href="#">Esqueci minha senha</a>
            </div>

            <button type="submit">Entrar</button>

            <p class="cadastro">Não tem uma conta? <a href="#">Cadastre-se</a></p>
        </form>
    </main>

</body>
</html>
